<!DOCTYPE html>
<html>

<head>

    <title>Transaction History</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
        }

        table{
            width:90%;
            margin:auto;
            border-collapse:collapse;
            margin-top:40px;
        }

        th,td{
            border:1px solid gray;
            padding:15px;
            text-align:center;
        }

        th{
            background:#1e293b;
        }

        tr:nth-child(even){
            background:#111827;
        }

        h1{
            text-align:center;
            margin-top:20px;
        }

    </style>

</head>

<body>

<h1>Transaction History</h1>

<table>

<tr>
    <th>ID</th>
    <th>Amount</th>
    <th>Old Balance</th>
    <th>New Balance</th>
    <th>Type</th>
    <th>Prediction</th>
    <th>Risk Score</th>
    <th>Time</th>
</tr>

{% for row in transactions %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>
<td>{{ row[6] }}%</td>
<td>{{ row[7] }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
